<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wte merchan shop</title>
    <style>
        * { padding: 0; margin: 0; }

        body {
            width: auto;
            height: auto;
        }

        header {
            width: 100%;
            height: 90px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            outline: 3px solid #000000;
            color: #000000;
        }

        .logo-section img {
            width: auto;
            height: 48px;
        }


        .bucket {
            margin-left: 80%;
        }

        .login {
            margin-left: 20px;
        }

        .merchan-section {
            width: 100%;
            height: 1000px;
            display: grid;
            grid-template-columns: repeat(4, auto);
            justify-content: space-evenly;

        }

        .merchan-card {
            width: 370px;
            height: 410px;
            overflow: hidden;
        }
        
        .merchan-card a {
            text-decoration: none;
            color: var(--deep-ocean);
        }

        .merchan-img-section img {
            width: 370px;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: -14px;
        }

        .merchan-img-section:hover {
            opacity: 0.5;
            transform: scale(1.05);
            transition: 0.5s;
            cursor: pointer;
        }

        .merchan-text-section p {
            text-align: center;
            font-size: 18px;
        }
    </style>
</head>

    <header>
