<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>play with earth! 0.03</title>
    <style>
        :root {
            --color-md: #cacaca;
            --color-dk: #A4ACAE;
            --color-lt: #E8EAEB;
        }

        * { padding: 0; margin: 0; }

        body {
            background: linear-gradient(120deg, #AA8C6E ,#c8aa96, #8A6349, #B08669);
            background-repeat: no-repeat;
            height: 1500px;
        }

        header {
            height: 90px;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            outline: 3px solid #5C4231;
            color: #5C4231;
        }

        .logo-section {
            display: flex;
            gap: 50px;
        }

        .logo-section img {
            width: auto;
            height: 48px;
            object-fit: cover;
        }

        .menu {
            display: flex;
            gap: 50px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .cover-section {
            margin-top: 70px;
            width: 100%;
            height: 350px;
            justify-content: center;

        }

        .cover-img {
            position: absolute;
            left: 50%;
            width: 350px;
            height: 350px;
            transform: translateX(-50%);
            box-shadow: 0px 0px 30px 0.1px;
        }

        .song-list-section {
            display: flex;
            justify-content: space-evenly;
            margin-top: 50px;
            width: 100%;
            height: 900px;
        }

        .song-list {
            width: auto;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            font-size: 30px;
            text-align: left;
            color: #5C4231;
        }

        .song-list a {
            text-decoration: none;
            color: #5C4231;
        }

        .song-list:hover {
            color: #ac8a73;
        }


    </style>
</head>

<body>
    <header>
        <div class="logo-section">
            <a href="wave to earth.html">
                <img src="album\wte-img\wte logo.webp" alt="wtelogo">
            </a>
        </div>
        <div class="menu">
            <h1>play with earth! 0.03</h1>
        </div>
    </header>

    <section class="cover-section">
        <img class="cover-img" src="album/album-img/play with earth.webp" alt="play with earth">
    </section>


    <section class="song-list-section"> 
        <div class="song-list">
            <a href="https://www.youtube.com/watch?v=JYwf3WLwI1A">
                <h3>1. are you bored?           </h3>
            </a>
            <a href="https://www.youtube.com/watch?v=u0OOntaDnhw">
                <h3>2. play with earth!         </h3>
            </a>
            <a href="https://www.youtube.com/watch?v=Zib3saCVpTo">
                <h3>3. annie.</h3>
            </a>
            <a href="https://www.youtube.com/watch?v=4syosd6_M1E">
                <h3>4. pueblo (remastered 2024) </h3>
            </a>
            <a href="https://www.youtube.com/watch?v=tNU9PTBTeGw">
                <h3>5. beck.                    </h3>
            </a>
            <a href="https://www.youtube.com/watch?v=l-3fj0dUqBA">
                <h3>6. slow dive                    </h3>
            </a>
            <a href="https://www.youtube.com/watch?v=_dP7MzPPXZc">
                <h3>7. holyland                     </h3>
            </a>
        </div>

    </section>
</body>
</html>
