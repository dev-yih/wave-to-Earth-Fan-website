<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0.1 flaws and all.</title>
    <style>
        :root {
            --color-md: #cacaca;
            --color-dk: #A4ACAE;
            --color-lt: #E8EAEB;
        }

        * { padding: 0; margin: 0; }

        body {
            background: var(--soft-cream);
        }

        header {
            height: 90px;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            outline: 3px solid var(--color-lt);
        }

        .logo-section {
            display: flex;
            gap: 50px;
        }

        .logo-section img {
            width: auto;
            height: 48px;
            object-fit: cover;
        }

        .menu {
            display: flex;
            gap: 50px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .cover-section {
            margin-top: 70px;
            width: 100%;
            height: 350px;
            justify-content: center;

        }

        .cover-img {
            position: absolute;
            left: 50%;
            width: 350px;
            height: 350px;
            transform: translateX(-50%);
            box-shadow: 0px 0px 30px 0.1px;
        }

        .song-list-section {
            display: flex;
            justify-content: space-evenly;
            margin-top: 50px;
            width: 100%;
            height: 1000px;
        }

        .song-list {
            width: auto;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            font-size: 30px;
            text-align: left;
        }

        .song-length {
            width: auto;
            text-align: left;
            font-size: 30px;
        }

    </style>
</head>

<body>

    </section>


    <section class="song-list-section">
